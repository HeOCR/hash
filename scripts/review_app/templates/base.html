<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HASH Review{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #6c8ef5;
      --accent2: #8b6cf5;
      --danger: #e05260;
      --success: #3ecf8e;
      --warn: #f5a623;
      --text: #e8eaf2;
      --muted: #7880a0;
      --radius: 10px;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .05em;
      color: var(--text);
    }
    header .logo span { color: var(--accent); }
    header nav { margin-left: auto; display: flex; gap: 12px; align-items: center; }
    header nav a { color: var(--muted); font-size: 13px; }
    header nav a:hover { color: var(--text); text-decoration: none; }

    /* ── Global action-strip toggle ── */
    #actions-toggle {
      padding: 5px 12px;
      font-size: 12px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
    }
    #actions-toggle:hover { color: var(--text); border-color: var(--muted); }
    body.show-actions #actions-toggle {
      background: var(--accent2);
      color: #fff;
      border-color: var(--accent2);
    }

    /* Hide all action strips and comment boxes by default */
    .action-strip          { display: none !important; }
    body.show-actions .action-strip { display: flex !important; }

    /* Browse-mode save bar (shown only when actions on) */
    .browse-save-bar       { display: none !important; }
    body.show-actions .browse-save-bar { display: flex !important; }

    main { padding: 32px 24px; max-width: 1400px; margin: 0 auto; }

    h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
    h2 { font-size: 17px; font-weight: 600; margin: 0 0 16px; }
    .muted { color: var(--muted); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .badge-pending  { background: #3a2e1a; color: var(--warn); }
    .badge-approved { background: #1a3a2e; color: var(--success); }
    .badge-rejected { background: #3a1a1f; color: var(--danger); }
    .badge-info     { background: #1a2240; color: var(--accent); }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    button, .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s;
    }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5a7cf0; }
    .btn-danger   { background: var(--danger); color: #fff; border-color: var(--danger); }
    .btn-danger:hover { background: #c8404e; }
    .btn-ghost    { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-success  { background: var(--success); color: #0a2019; }
    .btn-success:hover { background: #32b87c; }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <header>
    <div class="logo"><span>HASH</span> Review</div>
    <nav>
      <a href="/">Home</a>
      <a href="/audit">Audit corpus</a>
      <button id="actions-toggle" onclick="toggleActions()">✎ Actions</button>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <!-- Global action-toggle state -->
  <script>
    (function() {
      if (localStorage.getItem('showActions') === '1') {
        document.body.classList.add('show-actions');
      }
    })();
    function toggleActions() {
      const on = document.body.classList.toggle('show-actions');
      localStorage.setItem('showActions', on ? '1' : '0');
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
