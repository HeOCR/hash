name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate JSONL indexes
        run: python scripts/validate_indexes.py
      - name: Validate datapackage.json against Frictionless spec
        run: |
          python -c "
          import sys
          from frictionless import Package
          package = Package('datapackage.json')
          errors = list(Package.metadata_validate(package.to_descriptor()))
          if errors:
              for error in errors:
                  print(f'ERROR: {getattr(error, \"message\", str(error))}', file=sys.stderr)
              sys.exit(1)
          print(f'ok: datapackage.json metadata valid ({package.name} v{package.version})')
          "
      - name: Check release artefacts are up to date (run `python3 scripts/generate_release_artifacts.py` to refresh)
        run: python scripts/generate_release_artifacts.py --check
      - name: Run pytest
        run: python -m pytest
