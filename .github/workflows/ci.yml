name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate JSONL indexes
        run: python scripts/validate_indexes.py
      - name: Validate datapackage.json metadata against Frictionless spec (run `python3 scripts/validate_datapackage.py` to reproduce)
        run: python scripts/validate_datapackage.py
      - name: Check release artefacts are up to date (run `python3 scripts/generate_release_artifacts.py` to refresh)
        run: python scripts/generate_release_artifacts.py --check
      - name: Check README status section is up to date (run `python3 scripts/update_readme_status.py` to refresh)
        run: python scripts/update_readme_status.py --check
      - name: Check CSV exports are up to date (run `python3 scripts/build_exports.py` to refresh)
        run: python scripts/build_exports.py --check
      - name: Run pytest
        run: python -m pytest
